version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: aperturas-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: aperturas_kfc

  backend:
    build: ./backend
    container_name: aperturas-backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://mongodb:27017/aperturas_kfc
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    volumes:
      - ./backend/uploads:/app/uploads

volumes:
  mongodb_data: